server:
  port: 8080

app:
  name: course-system
  upload:
    video-dir: /Users/shiyang/Desktop/graduate_design/course_videos
  video:
    base-url: http://localhost:8080
    ffprobe-path: /opt/homebrew/bin/ffprobe

spring:
  application:
    name: course-system
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:mysql://localhost:3306/course_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: dev
    password: dev123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      jedis:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 3000
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j123
  
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.sy.course_system.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

recommend:
  service:
    url: http://localhost:8000

logging:
  level:
    org.springframework.transaction: DEBUG
    org.springframework.jdbc.datasource.DataSourceTransactionManager: DEBUG