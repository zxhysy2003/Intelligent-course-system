services:
  mysql:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: course_db
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      TZ: Asia/Shanghai
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./course_db.sql:/docker-entrypoint-initdb.d/01-course_db.sql:ro
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7.2
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256m

  neo4j-init:
    image: neo4j:5.11
    restart: "no"
    user: "neo4j"
    volumes:
      - neo4j_data:/data
      - ./neo4j-backups:/backups:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      if [ ! -d /data/databases/neo4j ]; then
        neo4j-admin database load --from-path=/backups neo4j --overwrite-destination=true;
      fi

  neo4j:
    image: neo4j:5.11
    restart: always
    depends_on:
      neo4j-init:
        condition: service_completed_successfully
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    deploy:
      resources:
        limits:
          memory: 2g
    tmpfs:
      - /var/lib/neo4j/run

volumes:
  mysql_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
